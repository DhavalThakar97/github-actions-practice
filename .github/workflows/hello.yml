# Workflow
# Should have Name
name: Hello

# On tells when the workflow should run (give indentation by TAB key)
on:
  workflow_dispatch: 

# Jobs tells what the workflow should do, there can be one or more than one jobs, hence we write Jobs
# Jobs is an object so needs indentation
jobs:
  # 1st Job (give indentation)
  say-hello:
    # Creates an Epheremal Container with Ubuntu running
    runs-on: ubuntu-latest
    # That ephermal contatiner will have steps to execute, hence name those steps and use run: run has the command
    steps:
      - name: Say hello to everyone
        run: echo "Hello Dosto"


